name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  conformance:
    name: Conformance
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Lint shipped records
        run: node tools/aidr-lint.mjs examples/ templates/AIDR-0000-template.md decisions/

      - name: Run conformance suite
        run: node tests/run.mjs
