<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Page not found - AIDR</title>
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#b45309">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="canonical" href="https://aidr.work/">
  <style>
    :root {
      --accent:   #b45309;
      --bg:       #f8f9fa;
      --surface:  #ffffff;
      --text:     #1a1d24;
      --muted:    #6b7280;
      --border:   rgba(0,0,0,.08);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:      #0d0f14;
        --surface: #161921;
        --text:    #e4e8f0;
        --muted:   #8890a4;
        --border:  rgba(255,255,255,.08);
      }
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      text-align: center;
    }

    .logo-wrap { margin-bottom: 1.5rem; opacity: .6; }

    pre {
      text-align: left;
      font-family: "SF Mono", "Fira Code", Menlo, Consolas, monospace;
      font-size: 0.8rem;
      line-height: 1.6;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem 1.25rem;
      margin: 0 auto 2rem;
      max-width: 360px;
      color: var(--muted);
    }
    pre .k { color: var(--accent); }

    .code {
      font-size: clamp(4rem, 20vw, 8rem);
      font-weight: 800;
      line-height: 1;
      color: var(--accent);
      letter-spacing: -.04em;
      margin-bottom: .5rem;
    }
    h1 {
      font-size: clamp(1.25rem, 4vw, 1.75rem);
      font-weight: 600;
      margin-bottom: .75rem;
    }
    p {
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.6;
      max-width: 36ch;
      margin: 0 auto 2rem;
    }

    .home-btn {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      font-size: .9375rem;
      text-decoration: none;
      padding: .65rem 1.4rem;
      border-radius: .5rem;
      transition: filter .15s;
    }
    .home-btn:hover { filter: brightness(1.12); }
    .home-btn:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
    }

    footer {
      position: fixed;
      bottom: 1.25rem;
      font-size: .8125rem;
      color: var(--muted);
    }
    footer a {
      color: var(--muted);
      text-decoration: underline;
      text-underline-offset: .2em;
    }
    footer a:hover { color: var(--text); }
  </style>
</head>
<body>

  <div class="logo-wrap" aria-hidden="true">
    <svg width="48" height="48" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
      <line x1="26" y1="25" x2="16" y2="7" stroke="var(--accent)" stroke-width="2.4" stroke-linecap="round"/>
      <line x1="6" y1="25" x2="16" y2="7" stroke="var(--accent)" stroke-width="2.4" stroke-linecap="round"/>
      <line x1="16" y1="27" x2="16" y2="7" stroke="var(--accent)" stroke-width="2.4" stroke-linecap="round" stroke-dasharray="2.6 3.2"/>
      <circle cx="16" cy="7" r="3" fill="var(--accent)"/>
    </svg>
  </div>

  <div class="code" aria-hidden="true">404</div>

  <h1>Page not found</h1>

  <pre aria-hidden="true"><span class="k">id</span>: AIDR-0000
<span class="k">title</span>: page not found
<span class="k">status</span>: open
<span class="k">arbiter</span>: you

<span class="k">### Position: server</span>
- provider: github-pages
- stance: oppose
- summary: this URL does not exist</pre>

  <p>This URL doesn&rsquo;t exist on AIDR. The spec lives at the root.</p>

  <a href="https://aidr.work/" class="home-btn">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
      <path d="M6.5 3L2 8l4.5 5M2 8h12" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    Return home
  </a>

  <footer>
    <a href="https://aidr.work/">AIDR</a>
  </footer>

</body>
</html>
